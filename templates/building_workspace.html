{% extends "base_public.html" %}

{% block title %}Building your workspace — Paramynd{% endblock %}

{% block extra_head %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* Variables de thème Paramynd */
:root {
  --r: 5px;
  --black: #050507;
  --purple: #7c5cfc;
  --teal: #06d6a0;
  --white: #ffffff;
  --gray-2: rgba(255,255,255,0.5);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.7);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 133.33vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  zoom: 0.75;
}

#brainCanvas {
  position: fixed; top: 0; left: 0;
  width: 133.33vw; height: 133.33vh;
  pointer-events: none; z-index: -1;
  opacity: 0;
  animation: canvasFadeIn 2s ease 0.5s forwards;
}
@keyframes canvasFadeIn { to { opacity: 1; } }

.hero-ambient {
  position: fixed; top: 0; left: 0; width: 133.33vw; height: 133.33vh; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(5,5,7,0) 30%, rgba(5,5,7,0.55) 100%),
    radial-gradient(ellipse 100% 30% at 50% 100%, rgba(5,5,7,0.8) 0%, transparent 100%);
}

.demo-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  padding: 1.2rem;
  margin: 24px auto;
  animation: fadeUp 0.8s ease-out;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.demo-card {
  background: rgba(18, 18, 24, 0.45);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r);
  padding: 3rem 2rem;
  text-align: center;
  box-shadow: var(--shadow-lg), 0 0 100px rgba(124,92,252,0.12);
}

.spinner {
  width: 70px;
  height: 70px;
  border: 4px solid rgba(255,255,255,0.05);
  border-left-color: var(--teal);
  border-right-color: var(--purple);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 2rem;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.loading-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin: 0 0 0.8rem;
  letter-spacing: -0.5px;
}

.loading-subtext {
  font-size: 0.9rem;
  color: var(--gray-2);
  margin: 0;
  min-height: 20px;
  transition: opacity 0.3s;
}

.success-icon {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(6, 214, 160, 0.1);
  color: var(--teal);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin: 0 auto 2rem;
  display: none;
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

</style>
{% endblock %}

{% block body %}
<canvas id="brainCanvas"></canvas>
<div class="hero-ambient"></div>

<div class="demo-container">
  <div class="demo-card">
    <div class="spinner" id="spinner"></div>
    <div class="success-icon" id="successIcon">✓</div>
    
    <h1 class="loading-title" id="loadingTitle">Building your workspace</h1>
    <p class="loading-subtext" id="loadingSubtext">Setting up environment...</p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const slug = "{{ slug }}";
  const statusUrl = `/api/v1/tenants/status/${slug}/`;

  const subtext    = document.getElementById('loadingSubtext');
  const title      = document.getElementById('loadingTitle');
  const spinner    = document.getElementById('spinner');
  const successIcon = document.getElementById('successIcon');

  // Messages rotatifs pendant le provisioning (~2-4 min)
  const loadingMessages = [
    "Provisioning database...",
    "Configuring cloud resources...",
    "Deploying your application...",
    "Applying security policies...",
    "Running database migrations...",
    "Setting up your admin account...",
    "Finalizing your workspace...",
    "Almost there...",
  ];
  let msgIndex = 0;

  // Affiche le prochain message rotatif toutes les 8s
  function cycleMessage() {
    subtext.style.opacity = 0;
    setTimeout(() => {
      subtext.textContent = loadingMessages[msgIndex % loadingMessages.length];
      subtext.style.opacity = 1;
      msgIndex++;
    }, 300);
  }

  // Lance le cycle de messages
  cycleMessage();
  const msgInterval = setInterval(cycleMessage, 8000);

  function showSuccess(url) {
    clearInterval(msgInterval);
    clearInterval(pollInterval);
    spinner.style.display = 'none';
    successIcon.style.display = 'flex';
    title.textContent = "Workspace Ready!";
    subtext.style.opacity = 1;
    subtext.textContent = "Redirecting to your dashboard...";
    setTimeout(() => {
      const redirectBase = url || `https://${slug}.paramynd.com`;
      window.location.href = `${redirectBase}/auth/login/`;
    }, 1500);
  }

  function showError(message) {
    clearInterval(msgInterval);
    clearInterval(pollInterval);
    spinner.style.borderLeftColor = '#ff4d4f';
    spinner.style.borderRightColor = '#ff7875';
    title.textContent = "Provisioning Error";
    subtext.style.opacity = 1;
    subtext.textContent = message || "Une erreur est survenue. Contactez le support.";
  }

  // Timeout global : 10 minutes
  const MAX_POLL_MS = 10 * 60 * 1000;
  const startTime = Date.now();

  async function pollStatus() {
    // Timeout
    if (Date.now() - startTime > MAX_POLL_MS) {
      showError("Le provisionnement prend plus de temps que prévu. Nous vous contacterons.");
      return;
    }

    try {
      const res = await fetch(statusUrl, { cache: 'no-store' });
      if (!res.ok) {
        // 404 = tenant pas encore en DB → continuer à attendre
        if (res.status === 404) return;
        showError(`Erreur réseau (${res.status}).`);
        return;
      }
      const data = await res.json();

      if (data.status === 'active') {
        showSuccess(data.url);
      } else if (data.status === 'failed') {
        showError(data.message);
      }
      // 'provisioning' → continuer le polling
    } catch (e) {
      // Erreur réseau temporaire → continuer
      console.warn('[BuildingWorkspace] Poll error:', e);
    }
  }

  // Démarrer le polling toutes les 3s (premier appel après 2s)
  setTimeout(pollStatus, 2000);
  const pollInterval = setInterval(pollStatus, 3000);


  /* ════════════════════════════════════════════════
     ANIMATION BRAIN CANVAS (ARRIÈRE-PLAN)
     ════════════════════════════════════════════════ */
  (function () {
    const canvas = document.getElementById('brainCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');

    const P  = [124, 92, 252];
    const T  = [6, 214, 160];

    function rgb(c,a)    { return `rgba(${c[0]},${c[1]},${c[2]},${+a.toFixed(3)})`; }
    function mix(a,b,t)  { return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]; }
    function lp(a,b,t)   { return a+(b-a)*t; }
    function eo(t,e=3)   { return 1-Math.pow(1-Math.min(t,1),e); }
    function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
    function rand(a,b)   { return a+Math.random()*(b-a); }

    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    const PH_BANG   = 0;
    const PH_FLY    = 1000;
    const PH_SETTLE = 2000;

    let nodes=[], rings=[], startT=null, raf;
    let mouse = {x:-9999,y:-9999};

    function connR() { return Math.hypot(W,H)*0.15; }

    function mkNode() {
      const pad=50;
      const tx=rand(pad,W-pad), ty=rand(pad,H-pad);
      const cx=W*.5, cy=H*.5;
      const ang=Math.atan2(ty-cy,tx-cx)+rand(-0.35,0.35);
      const spd=rand(5,14);
      return {
        x:cx, y:cy,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        tx, ty,
        r:rand(1.4,3.8), hue:Math.random(),
        ph:rand(0,Math.PI*2), phSpd:rand(0.007,0.022),
        bright:rand(0.5,1.0),
        wAng:rand(0,Math.PI*2), wSpd:rand(0.0003,0.0008),
        trail:[], isPlanet:false,
      };
    }

    function init(){
      nodes=Array.from({length:140},mkNode);
      startT=null;
      const pCount=7;
      const pIdx=[...Array(nodes.length).keys()].sort(()=>Math.random()-.5).slice(0,pCount);
      pIdx.forEach((i,k)=>{
        const n=nodes[i];
        n.isPlanet=true;
        n.r=rand(4.5,8.5);
        n.bright=1.0;
        const ang2=(k/pCount)*Math.PI*2+rand(-.3,.3);
        const dist=Math.min(W,H)*0.32;
        n.tx=W*.5+Math.cos(ang2)*dist;
        n.ty=H*.5+Math.sin(ang2)*dist;
      });
      for(const n of nodes) { n.x = n.tx; n.y = n.ty; }
    }

    function draw(ts){
      if(!startT)startT=ts;
      const t=ts-startT + 5000;
      const cx=W*.5,cy=H*.5;
      ctx.clearRect(0,0,W,H);

      const tE=t-PH_BANG;
      const fly=clamp(tE/(PH_FLY-PH_BANG),0,1);
      const setP=clamp((t-PH_FLY)/(PH_SETTLE-PH_FLY),0,1);

      for(const n of nodes){
        n.ph+=n.phSpd;
        if(n.trail.length>0) n.trail.shift();
        n.wAng+=n.wSpd*(1+.3*Math.sin(n.ph));
        const wF = n.isPlanet ? 0.003 : 0.005;
        n.vx+=Math.cos(n.wAng)*wF;
        n.vy+=Math.sin(n.wAng)*wF;
        
        if(!n.isPlanet){
          let nearP=null,nearD2=Infinity;
          for(const p of nodes){
            if(!p.isPlanet)continue;
            const gx=p.x-n.x,gy=p.y-n.y,gd2=gx*gx+gy*gy;
            if(gd2<nearD2){nearD2=gd2;nearP=p;}
          }
          if(nearP){
            const gd=Math.sqrt(nearD2)||1;
            const gravStr=0.003;
            n.vx+=(nearP.x-n.x)/gd*gravStr;
            n.vy+=(nearP.y-n.y)/gd*gravStr;
            n.vx += -(nearP.y-n.y)/gd * 0.006;
            n.vy += (nearP.x-n.x)/gd * 0.006;
          }
        } else {
          const cdx = cx - n.x, cdy = cy - n.y, cd = Math.hypot(cdx, cdy) || 1;
          if (cd > Math.min(W,H)*0.3) {
            n.vx += (cdx/cd) * 0.002;
            n.vy += (cdy/cd) * 0.002;
          }
        }
        
        const mdx=n.x-mouse.x,mdy=n.y-mouse.y,md2=mdx*mdx+mdy*mdy;
        if(md2<22000){const f=.6/Math.max(md2,1);n.vx+=mdx*f;n.vy+=mdy*f;}
        
        const pad=40;
        if(n.x<pad)n.vx+=(pad-n.x)*.01;
        if(n.x>W-pad)n.vx-=(n.x-(W-pad))*.01;
        if(n.y<pad)n.vy+=(pad-n.y)*.01;
        if(n.y>H-pad)n.vy-=(n.y-(H-pad))*.01;
        
        n.vx*=.991;n.vy*=.991;
        n.x+=n.vx;n.y+=n.vy;
      }

      for(const n of nodes){
        if(!n.trail.length)continue;
        const col=mix(P,T,n.hue);
        for(let i=0;i<n.trail.length;i++){
          const tp=i/n.trail.length;
          ctx.beginPath();
          ctx.arc(n.trail[i].x,n.trail[i].y,n.r*tp*.55,0,Math.PI*2);
          ctx.fillStyle=rgb(col,tp*.45*(1-fly*.4));
          ctx.fill();
        }
      }

      const cA=lp(0,0.13,eo(setP,3));
      const cR=connR();
      for(let i=0;i<nodes.length;i++){
        const a=nodes[i];
        for(let j=i+1;j<nodes.length;j++){
          const b=nodes[j];
          const dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;
          if(d2>cR*cR)continue;
          const d=Math.sqrt(d2);
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=rgb(mix(P,T,(a.hue+b.hue)*.5),cA*(1-d/cR));
          ctx.lineWidth=.7;ctx.stroke();
        }
      }

      for(const n of nodes){
        const col=mix(P,T,n.hue);
        const pul=.55+.45*Math.sin(n.ph);
        const r=n.r*(.88+.12*pul);
        const al=n.bright*pul*.9;
        if(n.isPlanet){
          const g2=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*18);
          g2.addColorStop(0,rgb(col,al*.35));g2.addColorStop(.5,rgb(col,al*.1));g2.addColorStop(1,rgb(col,0));
          ctx.beginPath();ctx.arc(n.x,n.y,r*18,0,Math.PI*2);
          ctx.fillStyle=g2;ctx.fill();
          ctx.beginPath();ctx.arc(n.x,n.y,r*1.6,0,Math.PI*2);
          ctx.fillStyle=rgb(col,al*.9);ctx.fill();
          ctx.beginPath();ctx.arc(n.x,n.y,r*1.6,0,Math.PI*2);
          ctx.strokeStyle=rgb(col,.25);ctx.lineWidth=r*.6;ctx.stroke();
        }else{
          const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*6);
          g.addColorStop(0,rgb(col,al*.4));g.addColorStop(1,rgb(col,0));
          ctx.beginPath();ctx.arc(n.x,n.y,r*6,0,Math.PI*2);
          ctx.fillStyle=g;ctx.fill();
          ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
          ctx.fillStyle=rgb(col,al);ctx.fill();
        }
      }
      
      raf=requestAnimationFrame(draw);
    }

    document.addEventListener('mousemove',e=>{
      mouse.x=e.clientX;mouse.y=e.clientY;
    },{passive:true});
    document.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});

    function start(){resize();init();raf=requestAnimationFrame(draw);}
    window.addEventListener('resize',()=>{cancelAnimationFrame(raf);start();});
    document.addEventListener('visibilitychange',()=>{
      if(document.hidden)cancelAnimationFrame(raf);
      else{startT=null;raf=requestAnimationFrame(draw);}
    });
    start();
  })();
</script>
{% endblock %}
