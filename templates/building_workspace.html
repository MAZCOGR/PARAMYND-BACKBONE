{% extends "base_public.html" %}

{% block title %}Building your workspace — Paramynd{% endblock %}

{% block extra_head %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/building_workspace.css">
{% endblock %}

{% block body %}
<canvas id="brainCanvas"></canvas>
<div class="hero-ambient"></div>

<div class="demo-container">
  <div class="demo-card">
    <div class="spinner" id="spinner"></div>
    <div class="success-icon" id="successIcon">✓</div>
    
    <h1 class="loading-title" id="loadingTitle">Building your workspace</h1>
    <p class="loading-subtext" id="loadingSubtext">Setting up environment...</p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<div id="tenant-data" data-slug="{{ slug }}" style="display:none;"></div>
<script src="/static/js/building_workspace.js"></script>
{% endblock %}
